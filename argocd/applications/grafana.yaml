apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: grafana
    spec:
      project: default
      sources:
        - repoURL: "https://grafana.github.io/helm-charts"
          chart: grafana
          targetRevision: "10.5.15"
          helm:
            valueFiles:
              - $values/helm/grafana/values.yaml
            values: |
              ingress:
                hosts:
                  - "{{metadata.labels.grafana_host}}"
                tls:
                  - secretName: grafana-tls
                    hosts:
                      - "{{metadata.labels.grafana_host}}"
              grafana.ini:
                server:
                  root_url: "https://{{metadata.labels.grafana_host}}"
        - repoURL: "{{metadata.annotations.repo_url}}"
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
