apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: loki
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: "{{repo_url}}"
        revision: feat/argocd
        files:
          - path: environments/*.yaml
  template:
    metadata:
      name: "loki-{{env}}"
    spec:
      project: default
      source:
        repoURL: "{{repo_url}}"
        targetRevision: main
        path: helm/loki
        helm:
          valueFiles:
            - values.yaml
          values: |
            loki:
              storage:
                bucketNames:
                  chunks: "{{project_id}}-loki-chunks"
                  ruler: "{{project_id}}-loki-chunks"
                  admin: "{{project_id}}-loki-chunks"
            serviceAccount:
              annotations:
                iam.gke.io/gcp-service-account: "{{env}}-loki@{{project_id}}.iam.gserviceaccount.com"
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
