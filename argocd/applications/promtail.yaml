apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: promtail
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: promtail
    spec:
      project: default
      sources:
        - repoURL: "https://grafana.github.io/helm-charts"
          chart: promtail
          targetRevision: "6.17.1"
          helm:
            valueFiles:
              - $values/helm/promtail/values.yaml
        - repoURL: "{{metadata.annotations.repo_url}}"
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
