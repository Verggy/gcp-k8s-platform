apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: prometheus
    spec:
      project: default
      sources:
        - repoURL: "https://prometheus-community.github.io/helm-charts"
          chart: kube-prometheus-stack
          targetRevision: "83.7.0"
          helm:
            valueFiles:
              - $values/helm/prometheus/values.yaml
            values: |
              prometheus:
                prometheusSpec:
                  externalLabels:
                    cluster: "{{metadata.labels.env}}"
        - repoURL: "{{metadata.annotations.repo_url}}"
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
