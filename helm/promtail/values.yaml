daemonset:
  enabled: true

tolerations:
  - operator: Exists

config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  snippets:
    pipelineStages:
      - cri: {}
      - regex:
          expression: "(?i)(?P<level>error|warn|info|debug|trace)"
      - labels:
          level:
      - metrics:
          log_messages_total:
            type: Counter
            description: "Total log messages by level"
            source: level
            config:
              action: inc

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
