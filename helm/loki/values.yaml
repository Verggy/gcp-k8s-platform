deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: gcs
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: gcs
    gcs:
      chunk_buffer_size: 0

  limits_config:
    retention_period: 360h
    allow_structured_metadata: true

  compactor:
    retention_enabled: true
    delete_request_store: gcs

singleBinary:
  replicas: 1
  nodeSelector:
    purpose: infra
  tolerations:
    - key: purpose
      value: infra
      effect: NoSchedule
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard-rwo
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

serviceAccount:
  create: true
  name: loki

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false
